<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe Game</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Baloo+Bhaina+2:wght@600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2" />
  </head>
  <body>
    <div class="game-wrapper">
      <header class="header-nav">
        <a href="../index.html" class="back-btn">
          <i class="fa-solid fa-arrow-left"></i> Dashboard
        </a>
        <div class="audio-controls">
          <button id="music-toggle" class="audio-btn" title="Toggle Background Music">
            <i class="fa-solid fa-music"></i> <i class="fa-solid fa-volume-xmark vol-state"></i>
          </button>
        </div>
      </header>

      <div class="gameContainer">
        <div class="board-card">
          <div class="container">
            <div class="line"></div>
            <div class="box bt-0 bl-0" data-index="0"><span class="boxtext"></span></div>
            <div class="box bt-0" data-index="1"><span class="boxtext"></span></div>
            <div class="box bt-0 br-0" data-index="2"><span class="boxtext"></span></div>
            <div class="box bl-0" data-index="3"><span class="boxtext"></span></div>
            <div class="box" data-index="4"><span class="boxtext"></span></div>
            <div class="box br-0" data-index="5"><span class="boxtext"></span></div>
            <div class="box bl-0 bb-0" data-index="6"><span class="boxtext"></span></div>
            <div class="box bb-0" data-index="7"><span class="boxtext"></span></div>
            <div class="box bb-0 br-0" data-index="8"><span class="boxtext"></span></div>
          </div>
        </div>

        <div class="gameInfo">
          <h1>Tic Tac Toe</h1>
          <div class="status-card">
            <span class="info">Turn for X</span>
          </div>
          <div class="button-controls">
            <button id="reset" class="btn reset-btn">
              <i class="fa-solid fa-rotate-right"></i> Reset Game
            </button>
          </div>
          <div class="imgbox">
            <img src="excited.gif" alt="Winner Celebration" />
          </div>
        </div>
      </div>
    </div>
    
    <script src="script.js?v=2"></script>
  </body>
</html>
